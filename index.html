<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZooHelper Волгоград — Корма и Наполнители</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #87CEEB 0%, #98D8C8 50%, #4CAF50 100%);
            min-height: 100vh; color: #333;
        }
        .header { 
            background: rgba(255,255,255,0.97); 
            backdrop-filter: blur(20px); 
            padding: 1rem 2rem; 
            position: sticky; top: 0; z-index: 100;
        }
        .nav { 
            max-width: 1200px; margin: 0 auto; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-size: 1.8rem; font-weight: 700; color: #2E7D32; }
        .nav-links a { 
            margin-left: 2rem; text-decoration: none; color: #333; 
            font-weight: 500; transition: color 0.3s; 
        }
        .nav-links a:hover { color: #4CAF50; }
        #cart-btn { 
            background: linear-gradient(45deg, #FF6B35, #F57C00); 
            color: white; padding: 12px 20px; border-radius: 30px; 
            text-decoration: none; font-weight: 600; box-shadow: 0 5px 15px rgba(255,107,53,0.4);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .hero { 
            text-align: center; color: white; margin: 3rem 0; 
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.3rem; opacity: 0.95; }
        .products { background: rgba(255,255,255,0.95); padding: 3rem; border-radius: 30px; margin: 2rem 0; }
        .products h2 { text-align: center; color: #2E7D32; font-size: 2.5rem; margin-bottom: 2rem; }
        .products-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 2rem; 
        }
        .product-card { 
            background: white; border-radius: 25px; padding: 2rem; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            transition: all 0.4s; overflow: hidden; position: relative;
        }
        .product-card::before { 
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; 
            background: linear-gradient(90deg, #4CAF50, #FF6B35); 
        }
        .product-card:hover { 
            transform: translateY(-15px) scale(1.02); 
            box-shadow: 0 40px 80px rgba(0,0,0,0.25);
        }
        .product-card img { 
            width: 100%; height: 220px; object-fit: cover; border-radius: 20px; margin-bottom: 1.5rem; 
        }
        .product-card h3 { color: #1B5E20; margin-bottom: 1rem; font-size: 1.4rem; }
        .price { 
            font-size: 2.2rem; font-weight: 800; color: #4CAF50; 
            text-shadow: 1px 1px 2px rgba(76,175,80,0.3); margin-bottom: 1.5rem;
        }
        .buy-btn { 
            width: 100%; padding: 18px; background: linear-gradient(45deg, #4CAF50, #66BB6A); 
            color: white; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: 700; 
            cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(76,175,80,0.4);
        }
        .buy-btn:hover { 
            transform: scale(1.05); background: linear-gradient(45deg, #45a049, #4CAF50); 
            box-shadow: 0 15px 40px rgba(76,175,80,0.6);
        }
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2000; backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%); 
            max-width: 550px; width: 90%; max-height: 85vh; border-radius: 30px; 
            padding: 2.5rem; position: relative; animation: modalSlide 0.4s ease;
            box-shadow: 0 50px 100px rgba(0,0,0,0.4);
        }
        @keyframes modalSlide { from { transform: scale(0.7) translateY(50px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .close { position: absolute; top: 1.5rem; right: 2rem; font-size: 2.5rem; cursor: pointer; color: #999; font-weight: 300; }
        .total { font-size: 2rem; font-weight: 800; color: #4CAF50; margin: 2rem 0; text-align: center; }
        .checkout-btn { 
            width: 100%; padding: 20px; background: linear-gradient(45deg, #2196F3, #21CBF3); 
            color: white; border: none; border-radius: 15px; font-size: 1.3rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 15px 40px rgba(33,150,243,0.4);
        }
        .toast { 
            position: fixed; top: 30px; right: -450px; background: linear-gradient(45deg, #4CAF50, #66BB6A); 
            color: white; padding: 1.5rem 2.5rem; border-radius: 20px; font-weight: 600; font-size: 1.1rem;
            box-shadow: 0 20px 50px rgba(76,175,80,0.5); z-index: 3000; transition: right 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show { right: 30px; }
        @media (max-width: 768px) { 
            .hero h1 { font-size: 2.2rem; } 
            .products-grid { grid-template-columns: 1fr; } 
            .nav-links { flex-direction: column; gap: 1rem; margin-top: 1rem; }
        }
    </style>
</head>
<body>
    <!-- [ВСЁ ОСТАЛЬНОЕ ОСТАЁТСЯ ТАКИМ ЖЕ — вставь содержимое из предыдущего index.html] -->
    <header class="header">
        <nav class="nav">
            <div class="logo">🐾  ZooHelper Волгоград</div>
            <div class="nav-links">
                <a href="#services">Услуги</a>
                <a href="#kabinet">Кабинет</a>
                <a href="#" id="cart-btn">🛒  <span id="cart-count">0</span></a>
            </div>
        </nav>
    </header>
    
    <main class="container">
        <section class="hero">
            <h1>Корма • Наполнители • Витамины</h1>
            <p>Доставка по Волгограду 1-2 дня • 4Partners • Лучшие цены</p>
        </section>
        
        <section class="products">
            <h2>🔥  Хиты продаж</h2>
            <div class="products-grid">
                <div class="product-card" data-id="1" data-name="Силикатный наполнитель 5л" data-price="850">
                    <img src="https://via.placeholder.com/300x200/87CEEB/FFFFFF?text=Силикатный+5л" alt="Наполнитель">
                    <h3>Силикатный наполнитель 5л</h3>
                    <div class="price">850 ₽</div>
                    <button class="buy-btn">В корзину</button>
                </div>
                <div class="product-card" data-id="2" data-name="Brit Premium Cat 3кг" data-price="2490">
                    <img src="https://via.placeholder.com/300x200/4CAF50/FFFFFF?text=Brit+Premium" alt="Brit">
                    <h3>Brit Premium Adult Cat 3кг</h3>
                    <div class="price">2 490 ₽</div>
                    <button class="buy-btn">В корзину</button>
                </div>
                <div class="product-card" data-id="3" data-name="Витамины 8in1 паста" data-price="1200">
                    <img src="https://via.placeholder.com/300x200/FF6B35/FFFFFF?text=Витамины+8in1" alt="Витамины">
                    <h3>Витамины 8in1 (шерсть)</h3>
                    <div class="price">1 200 ₽</div>
                    <button class="buy-btn">В корзину</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Корзина и тост остаются как в прошлом блоке -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Корзина (<span id="modal-count">0</span>)</h2>
<div id="cart-items"></div>
            <div class="total">Итого: <span id="total-price">0</span> ₽</div>
            <button id="checkout" class="checkout-btn">Оформить заказ (ЮKassa)</button>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
