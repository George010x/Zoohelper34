<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZooHelper Волгоград — Корма и Наполнители</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <nav class="nav">
            <div class="logo">🐾  ZooHelper</div>
            <div class="nav-links">
                <a href="#services">Услуги</a>
                <a href="#kabinet">Кабинет</a>
                <a href="#" id="cart-btn">🛒  <span id="cart-count">0</span></a>
            </div>
        </nav>
    </header>

    <!-- Главный блок -->
    <main class="container">
        <section class="hero">
            <h1>Корма • Наполнители • Витамины</h1>
            <p>Волгоград • Доставка 1-2 дня • 4Partners</p>
        </section>

        <!-- Товары -->
        <section class="products" id="products">
            <h2>🔥  Хиты продаж</h2>
            <div class="products-grid">
                <div class="product-card" data-id="1" data-name="Силикатный наполнитель 5л" data-price="850">
                    <img src="https://via.placeholder.com/300x200/87CEEB/FFFFFF?text=Силикатный+наполнитель" alt="Наполнитель">
                    <h3>Силикатный наполнитель 5л</h3>
                    <div class="price">850 ₽</div>
                    <button class="buy-btn">В корзину</button>
                </div>
                <div class="product-card" data-id="2" data-name="Brit Premium Cat 3кг" data-price="2490">
                    <img src="https://via.placeholder.com/300x200/4CAF50/FFFFFF?text=Brit+Premium+Cat" alt="Brit">
                    <h3>Brit Premium Adult Cat 3кг</h3>
                    <div class="price">2 490 ₽</div>
                    <button class="buy-btn">В корзину</button>
                </div>
                <div class="product-card" data-id="3" data-name="Витамины 8in1 паста" data-price="1200">
                    <img src="https://via.placeholder.com/300x200/FF6B35/FFFFFF?text=Витамины+8in1" alt="Витамины">
                    <h3>Витамины 8in1 (шерсть)</h3>
                    <div class="price">1 200 ₽</div>
                    <button class="buy-btn">В корзину</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Корзина (модальное окно) -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Корзина (<span id="modal-count">0</span>)</h2>
            <div id="cart-items"></div>
            <div class="total">Итого: <span id="total-price">0</span> ₽</div>
            <button id="checkout" class="checkout-btn">Оформить заказ (ЮKassa)</button>
        </div>
    </div>

    <!-- Уведомление -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
